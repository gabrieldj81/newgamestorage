	    @font-face {
		font-family: EuropeExt;
		src: url("fonts/EuropeExtNonBold.otf") format("opentype");
	    }
	    @font-face {
		font-family: DejaVuSansMono;
		src: url("fonts/DejaVuSansMono.ttf") format("truetype");
	    }
	    @font-face {
		font-family: Roboto;
		src: url("fonts/Roboto.ttf") format("truetype");
	    }
	    body
	    {
		padding: 0;
		margin: 0;
		background-color: #000000;
		overflow: hidden;
		position: fixed;
		left: 0;
		right: 0;
		top: 0;
		bottom: 0;
	    }
	    pb2Container, pb2Button, .pb2Input, pb2ProxyMovieClip
	    {
		font-family: DejaVuSansMono;
		color: #ffffff;
		font-size: 5px;
		
		display: block;
		position: fixed;
		
		box-sizing: border-box;
		visibility: visible;
		user-select: none;
	    }
	    pb2Container
	    {
		background-color: rgba(0,255,0,0.2);
		visibility: hidden;
	    }
	    pb2Button
	    {
		font-family: EuropeExt;
		color: #88D0FF;

		display: flex;
		justify-content: center;
		align-items: center;
		
		background-color: #0000008a;
		border: 1px solid rgba( 60, 157, 255, 0.3 );
		
		cursor: pointer;
	    }
	    pb2Button:hover
	    {
		background-color: rgba( 0, 178, 255, 0.3 );
		border: 1px solid rgba( 60, 157, 255, 1 );
	    }
	    pb2Button:active
	    {
		background-color: rgba( 0, 178, 255, 0.46 );
		border: 1px solid rgba( 60, 157, 255, 1 );
	    }
	    .pb2Input
	    {
		font-family: DejaVuSansMono;
		color: #ffffff;
		font-size: 12px;
		border: none;
		box-sizing: border-box;
		padding: 5px;
		margin: 0;
		user-select: unset;
		outline: none;
		background: transparent;
		resize: none;
		word-break: break-all;
		scrollbar-width: thin;
	    }
	    .pb2Input::selection {
		color: #000000;
		background-color: #d2ecff;
	    }
	    
	    pb2Menu /* Scene */
	    {
		display: block;
		width: 800px;
		height: 400px;
		perspective: 445px;
		position: fixed;
		left: 0;
		top: 0;
		visibility: visible;
		mix-blend-mode: plus-lighter;
	    }
	    pb2MenuPanel /* Object */
	    {		
		position: relative;
		transform-style: preserve-3d;
		transform: translate3d(-45px, 182px, -210px) rotateY(55deg) rotateX(-1.6deg);
		display: block;
	    }
	    pb2MenuButton, pb2MenuButtonGhost /* Plane */
	    {		
		pointer-events: none;
		position: absolute;
		display: flex;
		justify-content: left;
		align-items: center;
		box-sizing: border-box;
		color: #BBD7FF;
		
		width: 200px;
		height: 20px;
		padding-left: 17px;
		font-size: 12px;
	    }
	    pb2MenuButtonGhost /* Plane */
	    {		
		pointer-events: none;
		background: transparent;
	    }
	    pb2MenuButtonOverTint
	    {
		pointer-events: none;
		position: absolute;
		background: #66CCFF47;
		box-sizing: border-box;
		
		width: 200px;
		height: 20px;
		border: 1px solid #3573B0;
	    }
	    pb2MenuButtonOverPlane
	    {
		pointer-events: none;
		position: absolute;
		transform-origin: left top;
		background: linear-gradient(180deg, #B4E1FE4d 0%, #B3E1FE3b 5%, #B0E2FE29 25%, transparent 100%);
		
		width: 200px;
		height: 26px;
	    }
	    pb2MenuButtonOverPlaneSide
	    {
		pointer-events: none;
		position: absolute;
		transform-origin: left top;
		background: linear-gradient(90deg, #B4E1FE4d 0%, #B3E1FE3b 5%, #B0E2FE29 25%, transparent 100%);
		
		width: 26px;
		height: 20px;
	    }
	    @keyframes marine_anim {
		0% {
		    transform: rotate(0deg);
		}
		50% {
		    transform: rotate(-0.2deg);
		}
	    }
	    @keyframes marine_glow_anim {
		0% {
		    opacity: 0.6;
		}
		10% {
		    opacity: 0.8;
		}
		20% {
		    opacity: 0.65;
		}
		30% {
		    opacity: 0.58;
		}
		40% {
		    opacity: 0.91;
		}
		50% {
		    opacity: 0.66;
		}
		60% {
		    opacity: 0.95;
		}
		70% {
		    opacity: 0.57;
		}
		80% {
		    opacity: 0.53;
		}
		90% {
		    opacity: 0.7;
		}
		100% {
		    opacity: 0.6;
		}
	    }
	    @keyframes menu_ship_animation
	    {
		0% {
		    transform: scale(1) translate(0, -500%);
		}
		100% {
		    transform: scale(0) translate(0, -500%);
		}
	    }
